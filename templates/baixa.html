{% extends 'base.html' %}
{% block content %}
<section id="secao-baixa" class="content-section active-section">
    <div class="form-max-width">
        <div class="section-heading">
            <div>
                <span class="eyebrow">Saídas</span>
                <h2>Dar baixa no estoque</h2>
            </div>
        </div>

        <div class="panel form-container">
            <div class="warning-banner">
                Atenção: O destino da saída é obrigatório para a prestação de contas do Balanço Social.
            </div>

            <form action="{{ url_for('baixa') }}" method="POST">
                
                <div class="form-row equal-cols">
                    <div class="input-group">
                        <label for="recebedor">Destino / Recebedor</label>
                        <select id="recebedor" name="recebedor" required>
                            <option value="" disabled selected>Selecione o destino</option>
                            <option value="Consumo Interno">Consumo Interno do Instituto</option>
                            <option value="Família Assistida">Doação Externa (Famílias Assistidas)</option>
                            <option value="Bazar">Venda no Bazar</option>
                            <option value="Outro">Outro Destino</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="observacao">Detalhes (Nome da Família / Obs)</label>
                        <input type="text" id="observacao" name="observacao" placeholder="Ex: Família Souza, Evento X...">
                    </div>
                </div>

                <div class="form-row equal-cols">
                    <div class="input-group">
                        <label for="produto-baixa">Produto para baixa (Em Estoque)</label>
                        <select id="produto-baixa" name="produto_id" required>
                            <option value="" disabled selected>Selecione um produto</option>
                            {% for p in produtos %}
                                <option value="{{ p.ID }}">{{ p.Nome }} (Disponível: {{ p.Quantidade }} no {{ p.Local }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="quantidade-baixa">Quantidade a retirar</label>
                        <input type="number" id="quantidade-baixa" name="quantidade" value="1" min="1" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="telefone-contato">Telefone de contato <span>(opcional)</span></label>
                        <input type="tel" id="telefone-contato" name="telefone" placeholder="Ex: 3299906556948">
                    </div>
                </div>

                <button type="submit" class="btn-danger">Confirmar baixa</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
